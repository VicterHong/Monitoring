name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: '3.10'
        environment-file: environment.yml
        activate-environment: base
        auto-activate-base: true

    - name: Lint with flake8
      run: |
        # Tambahkan -y agar instalasi berjalan otomatis tanpa prompt konfirmasi
        conda install -y flake8
        # Menghentikan build jika ada syntax error atau nama yang tidak terdefinisi
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero memperlakukan semua error sebagai warning
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        # Tambahkan -y juga di sini
        conda install -y pytest
        pytest
